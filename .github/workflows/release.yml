# Release: build installers + CLI binaries on a v* tag and attach them to a
# draft GitHub Release.
#
# Why plain npm/cargo steps instead of tauri-apps/tauri-action:
#   - tauri-action's main value is creating the release and uploading the
#     bundles itself. Here the release must also carry standalone CLI binaries,
#     so assets are staged per-platform and attached in one final job — at
#     which point tauri-action would only be a third-party wrapper around a
#     single `npx tauri build` invocation.
#   - The desktop crate lives outside the root cargo workspace
#     (apps/desktop/src-tauri has its own [workspace]); explicit steps keep
#     that layout obvious.
#
# Maintainer flow: bump VERSION + tauri.conf.json + package.json + workspace
# version, push a matching tag (e.g. v0.1.0). A *draft* release appears under
# GitHub → Releases with generated notes and all assets; review and publish.
#
# ── Signing (not configured; all artifacts ship unsigned until then) ─────────
# macOS  — add repo secrets and uncomment the env lines in "Build desktop
#          bundles" below:
#   APPLE_CERTIFICATE               base64-encoded .p12 (Developer ID Application)
#   APPLE_CERTIFICATE_PASSWORD      password for the .p12
#   APPLE_SIGNING_IDENTITY          e.g. "Developer ID Application: Vulos (TEAMID)"
#   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID   for notarization (app-specific password)
# Windows — WINDOWS_CERT / WINDOWS_CERT_PASSWORD (code-signing .pfx), wired via
#   bundle.windows.certificateThumbprint or signCommand in tauri.conf.json.
# Updater — intentionally absent (no updater endpoints, zero default network
#   calls). If one is ever added: TAURI_SIGNING_PRIVATE_KEY /
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            # arm64 runner; produces a universal (arm64 + x86_64) app/dmg/CLI.
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: linux
            os: ubuntu-22.04
            rust-targets: ""
          - platform: windows
            os: windows-latest
            rust-targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check tag matches VERSION and tauri.conf.json
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(tr -d '[:space:]' < VERSION)"
          conf="$(python3 -c "import json;print(json.load(open('apps/desktop/src-tauri/tauri.conf.json'))['version'])")"
          echo "tag=$tag VERSION=$ver tauri.conf.json=$conf"
          [ "$tag" = "$ver" ] && [ "$tag" = "$conf" ] || {
            echo "::error::Version mismatch — bump VERSION and tauri.conf.json before tagging"; exit 1; }

      - uses: actions/setup-node@v4.2.0
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2.7.7
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install Linux system dependencies (webkit2gtk)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build desktop bundles
        working-directory: apps/desktop
        # env:                                            # ── macOS signing/notarization ──
        #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            npx tauri build --target universal-apple-darwin
          else
            npx tauri build
          fi

      - name: Build CLI (slipscan)
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cargo build --release -p slipscan-cli --target aarch64-apple-darwin
            cargo build --release -p slipscan-cli --target x86_64-apple-darwin
            lipo -create \
              target/aarch64-apple-darwin/release/slipscan \
              target/x86_64-apple-darwin/release/slipscan \
              -output target/release-slipscan-universal
          else
            cargo build --release -p slipscan-cli
          fi

      - name: Stage release assets
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p staging
          case "${{ matrix.platform }}" in
            macos)
              cp apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg staging/
              cp target/release-slipscan-universal "staging/slipscan-cli-${ver}-macos-universal"
              ;;
            linux)
              cp apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage staging/
              cp apps/desktop/src-tauri/target/release/bundle/deb/*.deb staging/
              cp target/release/slipscan "staging/slipscan-cli-${ver}-linux-x86_64"
              ;;
            windows)
              cp apps/desktop/src-tauri/target/release/bundle/msi/*.msi staging/
              cp apps/desktop/src-tauri/target/release/bundle/nsis/*.exe staging/
              cp target/release/slipscan.exe "staging/slipscan-cli-${ver}-windows-x86_64.exe"
              ;;
          esac
          ls -la staging

      - uses: actions/upload-artifact@v4.6.0
        with:
          name: bundles-${{ matrix.platform }}
          path: staging/*
          if-no-files-found: error

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          path: dist
          pattern: bundles-*
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - uses: softprops/action-gh-release@v2.2.1
        with:
          draft: true
          generate_release_notes: true
          name: SlipScan ${{ github.ref_name }}
          files: dist/*
